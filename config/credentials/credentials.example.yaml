# Example credential Secrets. Apply these in the same namespace as the
# SandboxTemplate, Sandbox, or SandboxClaim that references them.
#
# The default OpenAPI Secret name is configured by
# DEFAULT_OPENAPI_CREDENTIAL_SECRET in sandbox-operator-config. CRs can override
# it with spec.openapiCredentialRef.name.
apiVersion: v1
kind: Secret
metadata:
  name: sandbox-openapi-credentials
  namespace: default
type: Opaque
stringData:
  accessKeyId: "AKxxxxxxxxxxxxxxxx"
  secretAccessKey: "SKxxxxxxxxxxxxxxxx"
  accountId: "1234567890"
  region: "cn-beijing-6"
---
# KS3 mount credential. Reference it from:
# spec.ks3MountConfig.credentialRef.name
apiVersion: v1
kind: Secret
metadata:
  name: sandbox-ks3-credentials
  namespace: default
type: Opaque
stringData:
  accessKey: "KS3_AKxxxxxxxxxxxxxxxx"
  secretAccessKey: "KS3_SKxxxxxxxxxxxxxxxx"
  token: ""
---
# KPFS mount credential. Reference it from:
# spec.kpfsMountConfig.credentialRef.name
apiVersion: v1
kind: Secret
metadata:
  name: sandbox-kpfs-credentials
  namespace: default
type: Opaque
stringData:
  accessKey: "KPFS_AKxxxxxxxxxxxxxxxx"
  secretAccessKey: "KPFS_SKxxxxxxxxxxxxxxxx"
  token: ""
---
# Klog credential. Reference it from:
# spec.klog.credentialRef.name
#
# The current OpenAPI request model only sends klog enabled/disabled state; keep
# this Secret shape ready for the credential field once the OpenAPI accepts it.
apiVersion: v1
kind: Secret
metadata:
  name: sandbox-klog-credentials
  namespace: default
type: Opaque
stringData:
  accessKey: "KLOG_AKxxxxxxxxxxxxxxxx"
  secretAccessKey: "KLOG_SKxxxxxxxxxxxxxxxx"
  token: ""
---
# Image registry credential. Reference it from:
# spec.image.credentialRef.name
#
# The current OpenAPI request model preserves the reference on the CR but does
# not send registry credentials yet because the mapped ImageConfig has no
# credential fields.
apiVersion: v1
kind: Secret
metadata:
  name: sandbox-image-credentials
  namespace: default
type: kubernetes.io/dockerconfigjson
stringData:
  .dockerconfigjson: |
    {
      "auths": {
        "hub.kce.ksyun.com": {
          "username": "registry-user",
          "password": "registry-password",
          "auth": "base64(username:password)"
        }
      }
    }
